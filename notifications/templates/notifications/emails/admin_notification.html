{% extends "notifications/emails/base_email.html" %}

{% block title %}{{ subject }} - {{ project_name }}{% endblock %}

{% block content %}
  <h1 style="margin:0 0 16px; color:#000000; font-size:22px; font-weight:700;">{{ subject }}</h1>
  <p style="margin:0 0 24px; color:#000000; font-size:15px; line-height:1.6; white-space: pre-wrap;">
    {{ message }}
  </p>
{% endblock %}
